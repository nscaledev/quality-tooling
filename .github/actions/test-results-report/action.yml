name: 'Test Results Report'
description: 'Analyze test failures/skips, optionally publish test history, write a GitHub step summary, and optionally notify Slack'
author: 'Nscale'

branding:
  icon: 'bar-chart-2'
  color: 'blue'

inputs:
  test-results-path:
    description: 'Path to current test results. Supports a file or directory containing results.xml, junit.xml, results.json, or test-results.json.'
    required: true
  format:
    description: 'Current test result format: auto, ginkgo-json, junit, or playwright-json.'
    required: false
    default: 'auto'
  previous-results-path:
    description: 'Optional path to previous/baseline test results. Supports a file or directory.'
    required: false
    default: ''
  previous-results-format:
    description: 'Previous test result format: auto, ginkgo-json, junit, or playwright-json. Defaults to the current format.'
    required: false
    default: ''
  previous-results-source:
    description: 'Previous result source. Only path is currently supported.'
    required: false
    default: 'path'
  compare-with-previous:
    description: 'Compare current results with previous results: auto, true, or false. Auto enables comparison when previous-results-path is set.'
    required: false
    default: 'auto'
  write-step-summary:
    description: 'Append the analysis report to GITHUB_STEP_SUMMARY.'
    required: false
    default: 'true'
  send-slack:
    description: 'Send Slack notification: auto, true, or false. Auto sends when slack-webhook-url is provided.'
    required: false
    default: 'auto'
  slack-webhook-url:
    description: 'Slack incoming webhook URL. Backward-compatible with webhook-based notifications.'
    required: false
    default: ''
  fail-on-slack-error:
    description: 'Fail the action when Slack notification fails.'
    required: false
    default: 'false'
  environment:
    description: 'Environment name shown in the summary and Slack message.'
    required: false
    default: ''
  branch:
    description: 'Branch name shown in Slack. Defaults to GITHUB_REF_NAME.'
    required: false
    default: ''
  actor:
    description: 'Actor shown in Slack. Defaults to GITHUB_ACTOR.'
    required: false
    default: ''
  title:
    description: 'Report title.'
    required: false
    default: 'Test Results'
  workflow-url:
    description: 'GitHub Actions workflow run URL. Defaults from GitHub environment when omitted.'
    required: false
    default: ''
  report-url:
    description: 'Optional published report URL, such as Allure.'
    required: false
    default: ''
  publish-test-history:
    description: 'Publish normalized test attempt events: auto, true, or false. Explicit true defaults to OTLP over the github-test-history-otlp-writer Teleport bot.'
    required: false
    default: 'auto'
  test-history-publish-mode:
    description: 'Test history publishing mode: auto, otlp, or api. Auto uses OTLP for explicit publishing and API only for legacy API-url auto publishing.'
    required: false
    default: 'auto'
  test-history-otlp-endpoint:
    description: 'Existing OTLP HTTP logs endpoint. If omitted in OTLP mode, the action opens a Teleport-backed port-forward to the observability collector.'
    required: false
    default: ''
  test-history-teleport-proxy:
    description: 'Teleport proxy used for the test-history OTLP writer bot.'
    required: false
    default: 'nscale.teleport.sh:443'
  test-history-teleport-token:
    description: 'Teleport GitHub join token for OTLP test history shipping.'
    required: false
    default: 'github-test-history-otlp-writer'
  test-history-kube-cluster:
    description: 'Teleport Kubernetes cluster containing the observability collector.'
    required: false
    default: 'observability-prod-glo1'
  test-history-collector-namespace:
    description: 'Kubernetes namespace containing the OTLP collector service.'
    required: false
    default: 'telemetry'
  test-history-collector-service:
    description: 'Kubernetes service name for the OTLP collector.'
    required: false
    default: 'agent-collector'
  test-history-otlp-local-port:
    description: 'Local port used for the OTLP HTTP port-forward.'
    required: false
    default: '14318'
  test-history-otlp-collector-port:
    description: 'Collector service OTLP HTTP port.'
    required: false
    default: '4318'
  test-history-api-url:
    description: 'Legacy base URL for test-history-api. If omitted, TEST_HISTORY_API_URL is used.'
    required: false
    default: ''
  test-history-token:
    description: 'Legacy bearer token for test-history-api. If omitted, TEST_HISTORY_TOKEN is used.'
    required: false
    default: ''
  test-history-suite:
    description: 'Suite name stored in test history. Defaults to the parsed report name or action title.'
    required: false
    default: ''
  test-history-framework:
    description: 'Framework stored in test history. Defaults from format: junit, playwright, or ginkgo.'
    required: false
    default: ''
  test-history-env:
    description: 'Environment stored in test history. Defaults to environment.'
    required: false
    default: ''
  test-history-output-path:
    description: 'NDJSON spool path for replay. Defaults to $GITHUB_WORKSPACE/.test-history/events.ndjson.'
    required: false
    default: ''
  test-history-upload-spool:
    description: 'Upload the NDJSON retry spool artifact: on-failure, always, or false.'
    required: false
    default: 'on-failure'
  test-history-spool-artifact-name:
    description: 'Artifact name used when uploading the test history retry spool.'
    required: false
    default: 'test-history-events'
  test-history-artifact-url:
    description: 'Artifact or workflow URL stored with each test event. Defaults to report-url, then the GitHub workflow run URL.'
    required: false
    default: ''
  max-failures:
    description: 'Maximum failure details included in Slack and step summary.'
    required: false
    default: '10'
  max-skips:
    description: 'Maximum skipped test details included in the step summary.'
    required: false
    default: '10'
  include-skips:
    description: 'Include skipped test details in the step summary.'
    required: false
    default: 'true'
  enable-ai-analysis:
    description: 'Run Claude failure analysis and include it in the step summary and Slack.'
    required: false
    default: 'false'
  claude-token:
    description: 'Claude Code OAuth token. If omitted, CLAUDE_CODE_OAUTH_TOKEN is used.'
    required: false
    default: ''
  enable-grafana-log-enrichment:
    description: 'Fetch related Loki logs through Grafana MCP. With AI analysis enabled, Claude first plans backend-related LogQL queries from parsed failures, then the fetched logs are included in the final report.'
    required: false
    default: 'false'
  grafana-service-account-token:
    description: 'Grafana service account token used by mcp-grafana. Required when this action starts mcp-grafana.'
    required: false
    default: ''
  grafana-app:
    description: 'Teleport app name for Grafana. When omitted, the action infers a default from environment: dev -> nks-dev-glo1-grafana, uat/stage/staging -> nks-stg-europe-west2-grafana.'
    required: false
    default: ''
  grafana-url:
    description: 'Direct Grafana URL for mcp-grafana. If omitted and grafana-app is set, defaults to the local Teleport tunnel URL. When set, the reporter also uses it to generate neutral Grafana links.'
    required: false
    default: ''
  grafana-org-id:
    description: 'Grafana organization ID used by mcp-grafana and internal Explore URL generation.'
    required: false
    default: '1'
  grafana-teleport-proxy:
    description: 'Teleport proxy used for the Grafana app tunnel.'
    required: false
    default: 'nscale.teleport.sh:443'
  grafana-teleport-token:
    description: 'Teleport GitHub join token used for the Grafana app tunnel.'
    required: false
    default: 'github-grafana-access'
  grafana-tunnel-port:
    description: 'Local port for the Grafana Teleport app tunnel.'
    required: false
    default: '3000'
  grafana-mcp-version:
    description: 'mcp-grafana release tag to install.'
    required: false
    default: 'v0.7.10'
  grafana-mcp-port:
    description: 'Local port for the mcp-grafana streamable HTTP server.'
    required: false
    default: '8000'
  grafana-mcp-endpoint:
    description: 'Existing mcp-grafana streamable HTTP endpoint. When set, the action will not install or start mcp-grafana.'
    required: false
    default: ''
  grafana-loki-datasource-uid:
    description: 'Loki datasource UID. If omitted, the reporter discovers the default/first Loki datasource through MCP.'
    required: false
    default: ''
  grafana-loki-datasource-name:
    description: 'Optional Loki datasource name to select during datasource discovery.'
    required: false
    default: 'Loki'
  grafana-log-start:
    description: 'Optional RFC3339 start time for Grafana log queries.'
    required: false
    default: ''
  grafana-log-end:
    description: 'Optional RFC3339 end time for Grafana log queries. Defaults to now.'
    required: false
    default: ''
  grafana-log-lookback:
    description: 'Lookback duration used when grafana-log-start is omitted.'
    required: false
    default: '2h'
  grafana-log-limit:
    description: 'Maximum log lines per Grafana MCP query.'
    required: false
    default: '20'
  grafana-log-concurrency:
    description: 'Maximum parallel Grafana MCP query_loki_logs calls.'
    required: false
    default: '4'
  grafana-log-max-failures:
    description: 'Maximum failed tests to query with AI-planned queries.'
    required: false
    default: '6'

outputs:
  total:
    description: 'Total tests parsed.'
    value: ${{ steps.report.outputs.total }}
  passed:
    description: 'Passed tests parsed.'
    value: ${{ steps.report.outputs.passed }}
  failed:
    description: 'Failed tests parsed.'
    value: ${{ steps.report.outputs.failed }}
  skipped:
    description: 'Skipped tests parsed.'
    value: ${{ steps.report.outputs.skipped }}
  duration:
    description: 'Formatted test duration.'
    value: ${{ steps.report.outputs.duration }}
  duration-ms:
    description: 'Test duration in milliseconds.'
    value: ${{ steps.report.outputs.duration-ms }}
  conclusion:
    description: 'success when no failed tests were parsed, otherwise failure.'
    value: ${{ steps.report.outputs.conclusion }}
  new-failures:
    description: 'Failures present in current results but not previous results.'
    value: ${{ steps.report.outputs.new-failures }}
  recurring-failures:
    description: 'Failures present in both current and previous results.'
    value: ${{ steps.report.outputs.recurring-failures }}
  resolved-failures:
    description: 'Previous failures no longer failing in current results.'
    value: ${{ steps.report.outputs.resolved-failures }}
  new-skips:
    description: 'Skipped tests present in current results but not previous results.'
    value: ${{ steps.report.outputs.new-skips }}
  recurring-skips:
    description: 'Skipped tests present in both current and previous results.'
    value: ${{ steps.report.outputs.recurring-skips }}
  resolved-skips:
    description: 'Previous skipped tests no longer skipped in current results.'
    value: ${{ steps.report.outputs.resolved-skips }}
  slack-sent:
    description: 'true if a Slack notification was sent successfully.'
    value: ${{ steps.report.outputs.slack-sent }}
  test-history-enabled:
    description: 'true if test history publishing/spooling ran.'
    value: ${{ steps.report.outputs.test-history-enabled }}
  test-history-publish-mode:
    description: 'Resolved test history publish mode: otlp or api.'
    value: ${{ steps.report.outputs.test-history-publish-mode }}
  test-history-shipping-status:
    description: 'Test history shipping status: disabled, pending, no-events, posted, or failed.'
    value: ${{ steps.report.outputs.test-history-shipping-status }}
  test-history-failure-reason:
    description: 'Single-line reason when test history shipping failed.'
    value: ${{ steps.report.outputs.test-history-failure-reason }}
  test-history-events:
    description: 'Number of normalized test history events produced.'
    value: ${{ steps.report.outputs.test-history-events }}
  test-history-posted:
    description: 'true if events were accepted by the OTLP collector or legacy test-history-api.'
    value: ${{ steps.report.outputs.test-history-posted }}
  test-history-spool-path:
    description: 'Path to the NDJSON test history spool file.'
    value: ${{ steps.report.outputs.test-history-spool-path }}
  test-history-spool-artifact-url:
    description: 'URL for the uploaded test history retry spool artifact when upload ran.'
    value: ${{ steps.test-history-upload-spool.outputs.artifact-url }}

runs:
  using: 'composite'
  steps:
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: ${{ github.action_path }}/go.mod
        cache: true
        cache-dependency-path: ${{ github.action_path }}/go.sum

    - name: Resolve Test History publishing
      id: test-history-resolve
      shell: bash
      env:
        INPUT_PUBLISH_TEST_HISTORY: ${{ inputs.publish-test-history }}
        INPUT_TEST_HISTORY_PUBLISH_MODE: ${{ inputs.test-history-publish-mode }}
        INPUT_TEST_HISTORY_API_URL: ${{ inputs.test-history-api-url }}
        INPUT_TEST_HISTORY_OTLP_ENDPOINT: ${{ inputs.test-history-otlp-endpoint }}
        INPUT_TEST_HISTORY_OTLP_LOCAL_PORT: ${{ inputs.test-history-otlp-local-port }}
        INPUT_TEST_HISTORY_UPLOAD_SPOOL: ${{ inputs.test-history-upload-spool }}
        TEST_HISTORY_API_URL: ${{ env.TEST_HISTORY_API_URL }}
        TEST_HISTORY_OTLP_ENDPOINT: ${{ env.TEST_HISTORY_OTLP_ENDPOINT }}
      run: |
        set -euo pipefail

        require_single_line() {
          local name="$1"
          local value="$2"
          if [[ "$value" == *$'\n'* || "$value" == *$'\r'* ]]; then
            echo "::error::${name} must be a single-line value"
            exit 1
          fi
        }

        require_port() {
          local name="$1"
          local value="$2"
          require_single_line "$name" "$value"
          if [[ ! "$value" =~ ^[0-9]+$ ]] || (( value < 1 || value > 65535 )); then
            echo "::error::${name} must be a TCP port between 1 and 65535"
            exit 1
          fi
        }

        write_output() {
          local name="$1"
          local value="$2"
          require_single_line "$name" "$value"
          printf '%s=%s\n' "$name" "$value" >> "$GITHUB_OUTPUT"
        }

        lower() {
          printf '%s' "$1" | tr '[:upper:]' '[:lower:]'
        }

        publish_setting="$(lower "${INPUT_PUBLISH_TEST_HISTORY:-auto}")"
        mode_setting="$(lower "${INPUT_TEST_HISTORY_PUBLISH_MODE:-auto}")"
        api_url="${INPUT_TEST_HISTORY_API_URL:-${TEST_HISTORY_API_URL:-}}"
        otlp_endpoint="${INPUT_TEST_HISTORY_OTLP_ENDPOINT:-${TEST_HISTORY_OTLP_ENDPOINT:-}}"
        local_port="${INPUT_TEST_HISTORY_OTLP_LOCAL_PORT}"
        upload_spool="$(lower "${INPUT_TEST_HISTORY_UPLOAD_SPOOL:-on-failure}")"

        require_single_line "publish-test-history" "$publish_setting"
        require_single_line "test-history-publish-mode" "$mode_setting"
        require_single_line "test-history-api-url" "$api_url"
        require_single_line "test-history-otlp-endpoint" "$otlp_endpoint"
        require_single_line "test-history-upload-spool" "$upload_spool"

        case "$upload_spool" in
          always|on-failure|false)
            ;;
          *)
            echo "::error::test-history-upload-spool must be one of: on-failure, always, false"
            exit 1
            ;;
        esac

        case "$publish_setting" in
          true|1|yes|y|on)
            enabled="true"
            explicit_publish="true"
            ;;
          false|0|no|n|off)
            enabled="false"
            explicit_publish="false"
            ;;
          *)
            explicit_publish="false"
            if [[ -n "$api_url" || -n "$otlp_endpoint" ]]; then
              enabled="true"
            else
              enabled="false"
            fi
            ;;
        esac

        case "$mode_setting" in
          api|otlp)
            mode="$mode_setting"
            ;;
          *)
            if [[ -n "$otlp_endpoint" || "$explicit_publish" == "true" ]]; then
              mode="otlp"
            elif [[ -n "$api_url" ]]; then
              mode="api"
            else
              mode="otlp"
            fi
            ;;
        esac

        needs_tunnel="false"
        if [[ "$enabled" == "true" && "$mode" == "otlp" && -z "$otlp_endpoint" ]]; then
          require_port "test-history-otlp-local-port" "$local_port"
          needs_tunnel="true"
          otlp_endpoint="http://127.0.0.1:${local_port}/v1/logs"
        fi

        echo "Test history publishing enabled: ${enabled}"
        echo "Test history publish mode: ${mode}"
        echo "Test history needs OTLP collector tunnel: ${needs_tunnel}"

        write_output "enabled" "$enabled"
        write_output "mode" "$mode"
        write_output "otlp-endpoint" "$otlp_endpoint"
        write_output "needs-otlp-tunnel" "$needs_tunnel"
        write_output "upload-spool" "$upload_spool"

    - name: Resolve Grafana MCP inputs
      id: grafana-resolve
      if: ${{ inputs.enable-grafana-log-enrichment == 'true' }}
      shell: bash
      env:
        INPUT_ENVIRONMENT: ${{ inputs.environment }}
        INPUT_GRAFANA_APP: ${{ inputs.grafana-app }}
        INPUT_GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ inputs.grafana-service-account-token }}
      run: |
        set -euo pipefail

        require_single_line() {
          local name="$1"
          local value="$2"
          if [[ "$value" == *$'\n'* || "$value" == *$'\r'* ]]; then
            echo "::error::${name} must be a single-line value"
            exit 1
          fi
        }

        workflow_escape() {
          local value="$1"
          value="${value//%/%25}"
          value="${value//$'\r'/%0D}"
          value="${value//$'\n'/%0A}"
          printf '%s' "$value"
        }

        mask_value() {
          local name="$1"
          local value="$2"
          if [[ -z "$value" ]]; then
            return 0
          fi
          require_single_line "$name" "$value"
          echo "::add-mask::$(workflow_escape "$value")"
        }

        write_output() {
          local name="$1"
          local value="$2"
          require_single_line "$name" "$value"
          printf '%s=%s\n' "$name" "$value" >> "$GITHUB_OUTPUT"
        }

        grafana_app="${INPUT_GRAFANA_APP:-}"
        if [[ -z "$grafana_app" ]]; then
          case "${INPUT_ENVIRONMENT,,}" in
            dev|development)
              grafana_app="nks-dev-glo1-grafana"
              ;;
            uat|stage|staging)
              grafana_app="nks-stg-europe-west2-grafana"
              ;;
          esac
        fi
        if [[ -n "$grafana_app" && ! "$grafana_app" =~ ^[A-Za-z0-9._-]+$ ]]; then
          echo "::error::grafana-app contains unsupported characters"
          exit 1
        fi
        write_output "grafana-app" "$grafana_app"

        grafana_token="${INPUT_GRAFANA_SERVICE_ACCOUNT_TOKEN:-}"
        if [[ -z "$grafana_token" && -n "${GRAFANA_SERVICE_ACCOUNT_TOKEN:-}" ]]; then
          grafana_token="${GRAFANA_SERVICE_ACCOUNT_TOKEN}"
        fi
        mask_value "grafana-service-account-token" "$grafana_token"
        if [[ -n "$grafana_token" ]]; then
          write_output "token-configured" "true"
        else
          write_output "token-configured" "false"
        fi

    - name: Grafana MCP enrichment preflight
      if: ${{ inputs.enable-grafana-log-enrichment == 'true' }}
      shell: bash
      env:
        INPUT_GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ inputs.grafana-service-account-token }}
        INPUT_GRAFANA_APP: ${{ inputs.grafana-app }}
        INPUT_GRAFANA_APP_RESOLVED: ${{ steps.grafana-resolve.outputs.grafana-app }}
        INPUT_GRAFANA_URL: ${{ inputs.grafana-url }}
        INPUT_GRAFANA_ORG_ID: ${{ inputs.grafana-org-id }}
        INPUT_GRAFANA_MCP_ENDPOINT: ${{ inputs.grafana-mcp-endpoint }}
        INPUT_GRAFANA_LOKI_DATASOURCE_UID: ${{ inputs.grafana-loki-datasource-uid }}
        INPUT_GRAFANA_LOKI_DATASOURCE_NAME: ${{ inputs.grafana-loki-datasource-name }}
        INPUT_GRAFANA_LOG_LOOKBACK: ${{ inputs.grafana-log-lookback }}
        INPUT_GRAFANA_LOG_LIMIT: ${{ inputs.grafana-log-limit }}
        INPUT_GRAFANA_LOG_CONCURRENCY: ${{ inputs.grafana-log-concurrency }}
        INPUT_GRAFANA_LOG_MAX_FAILURES: ${{ inputs.grafana-log-max-failures }}
        INPUT_GRAFANA_TUNNEL_PORT: ${{ inputs.grafana-tunnel-port }}
        INPUT_GRAFANA_MCP_PORT: ${{ inputs.grafana-mcp-port }}
      run: |
        set -euo pipefail

        echo "::group::Grafana MCP enrichment preflight"

        require_single_line() {
          local name="$1"
          local value="$2"
          if [[ "$value" == *$'\n'* || "$value" == *$'\r'* ]]; then
            echo "::error::${name} must be a single-line value"
            exit 1
          fi
        }

        workflow_escape() {
          local value="$1"
          value="${value//%/%25}"
          value="${value//$'\r'/%0D}"
          value="${value//$'\n'/%0A}"
          printf '%s' "$value"
        }

        mask_value() {
          local name="$1"
          local value="$2"
          if [[ -z "$value" ]]; then
            return 0
          fi
          require_single_line "$name" "$value"
          echo "::add-mask::$(workflow_escape "$value")"
        }

        grafana_app="${INPUT_GRAFANA_APP_RESOLVED:-${INPUT_GRAFANA_APP:-}}"
        grafana_token="${INPUT_GRAFANA_SERVICE_ACCOUNT_TOKEN:-${GRAFANA_SERVICE_ACCOUNT_TOKEN:-}}"
        mask_value "grafana-service-account-token" "$grafana_token"

        bool() {
          if [[ -n "${1:-}" ]]; then
            echo "true"
          else
            echo "false"
          fi
        }

        echo "enabled: true"
        echo "existing MCP endpoint configured: $(bool "${INPUT_GRAFANA_MCP_ENDPOINT:-}")"
        echo "Grafana service account token configured: $(bool "${grafana_token:-}")"
        echo "Grafana app: ${grafana_app:-<empty>}"
        echo "direct Grafana URL configured: $(bool "${INPUT_GRAFANA_URL:-}")"
        echo "Grafana org ID: ${INPUT_GRAFANA_ORG_ID:-<empty>}"
        echo "Loki datasource UID configured: $(bool "${INPUT_GRAFANA_LOKI_DATASOURCE_UID:-}")"
        echo "Loki datasource name: ${INPUT_GRAFANA_LOKI_DATASOURCE_NAME:-<empty>}"
        echo "lookback: ${INPUT_GRAFANA_LOG_LOOKBACK}; limit: ${INPUT_GRAFANA_LOG_LIMIT}; max failures: ${INPUT_GRAFANA_LOG_MAX_FAILURES}; concurrency: ${INPUT_GRAFANA_LOG_CONCURRENCY}"
        echo "MCP setup is deferred until Claude selects at least one backend-related Loki query."

        if [[ -n "${INPUT_GRAFANA_MCP_ENDPOINT:-}" ]]; then
          echo "candidate setup path: use caller-provided mcp-grafana endpoint when backend queries are planned"
        elif [[ -z "${grafana_token:-}" ]]; then
          echo "candidate setup path: cannot start mcp-grafana if backend queries are planned; grafana-service-account-token is empty"
        elif [[ -n "${INPUT_GRAFANA_URL:-}" ]]; then
          echo "candidate setup path: start mcp-grafana against direct Grafana URL on port ${INPUT_GRAFANA_MCP_PORT}"
        elif [[ -n "${grafana_app:-}" ]]; then
          echo "candidate setup path: open Teleport app tunnel on port ${INPUT_GRAFANA_TUNNEL_PORT}, then start mcp-grafana on port ${INPUT_GRAFANA_MCP_PORT}"
        else
          echo "candidate setup path: cannot start mcp-grafana if backend queries are planned; neither grafana-url nor grafana-app is configured"
        fi
        echo "::endgroup::"

    - name: Plan Grafana MCP queries
      id: grafana-plan
      if: ${{ inputs.enable-grafana-log-enrichment == 'true' }}
      shell: bash
      env:
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_TEST_RESULTS_PATH_RAW: ${{ inputs.test-results-path }}
        INPUT_PREVIOUS_RESULTS_PATH_RAW: ${{ inputs.previous-results-path }}
        INPUT_PREVIOUS_RESULTS_FORMAT: ${{ inputs.previous-results-format }}
        INPUT_PREVIOUS_RESULTS_SOURCE: ${{ inputs.previous-results-source }}
        INPUT_COMPARE_WITH_PREVIOUS: ${{ inputs.compare-with-previous }}
        INPUT_ENVIRONMENT: ${{ inputs.environment }}
        INPUT_ENABLE_AI_ANALYSIS: ${{ inputs.enable-ai-analysis }}
        INPUT_CLAUDE_TOKEN: ${{ inputs.claude-token }}
        INPUT_ENABLE_GRAFANA_LOG_ENRICHMENT: ${{ inputs.enable-grafana-log-enrichment }}
        INPUT_GRAFANA_LOG_MAX_FAILURES: ${{ inputs.grafana-log-max-failures }}
        INPUT_GRAFANA_QUERY_PLAN_PATH: ${{ runner.temp }}/test-results-report-grafana-query-plan.json
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail

        require_single_line() {
          local name="$1"
          local value="$2"
          if [[ "$value" == *$'\n'* || "$value" == *$'\r'* ]]; then
            echo "::error::${name} must be a single-line value"
            exit 1
          fi
        }

        workflow_escape() {
          local value="$1"
          value="${value//%/%25}"
          value="${value//$'\r'/%0D}"
          value="${value//$'\n'/%0A}"
          printf '%s' "$value"
        }

        mask_value() {
          local name="$1"
          local value="$2"
          if [[ -z "$value" ]]; then
            return 0
          fi
          require_single_line "$name" "$value"
          echo "::add-mask::$(workflow_escape "$value")"
        }

        mask_value "claude-token" "${INPUT_CLAUDE_TOKEN:-}"

        WORKSPACE_DIR="${GITHUB_WORKSPACE:-$(pwd)}"

        TEST_RESULTS_PATH="${INPUT_TEST_RESULTS_PATH_RAW}"
        if [[ ! "$TEST_RESULTS_PATH" = /* ]]; then
          TEST_RESULTS_PATH="$WORKSPACE_DIR/$TEST_RESULTS_PATH"
        fi

        PREVIOUS_RESULTS_PATH="${INPUT_PREVIOUS_RESULTS_PATH_RAW}"
        if [[ -n "$PREVIOUS_RESULTS_PATH" && ! "$PREVIOUS_RESULTS_PATH" = /* ]]; then
          PREVIOUS_RESULTS_PATH="$WORKSPACE_DIR/$PREVIOUS_RESULTS_PATH"
        fi

        export INPUT_TEST_RESULTS_PATH="$TEST_RESULTS_PATH"
        export INPUT_PREVIOUS_RESULTS_PATH="$PREVIOUS_RESULTS_PATH"

        cd "${ACTION_PATH}"
        go run . --grafana-plan-only

    - name: Install Teleport clients for Grafana tunnel
      id: grafana-teleport-setup
      if: ${{ inputs.enable-grafana-log-enrichment == 'true' && steps.grafana-plan.outputs.needs-mcp == 'true' && inputs.grafana-mcp-endpoint == '' && steps.grafana-resolve.outputs.token-configured == 'true' && inputs.grafana-url == '' && steps.grafana-resolve.outputs.grafana-app != '' }}
      continue-on-error: true
      uses: teleport-actions/setup@a820ebbf1bc1a496efca348ad21042d6e8df73a6
      with:
        version: auto
        proxy: ${{ inputs.grafana-teleport-proxy }}

    - name: Open Grafana app tunnel
      id: grafana-tunnel
      if: ${{ inputs.enable-grafana-log-enrichment == 'true' && steps.grafana-plan.outputs.needs-mcp == 'true' && inputs.grafana-mcp-endpoint == '' && steps.grafana-resolve.outputs.token-configured == 'true' && inputs.grafana-url == '' && steps.grafana-resolve.outputs.grafana-app != '' && steps.grafana-teleport-setup.outcome != 'failure' }}
      continue-on-error: true
      uses: teleport-actions/application-tunnel@bb7a8fbfb67b85d26013554f10d71dd032c1c764
      with:
        proxy: ${{ inputs.grafana-teleport-proxy }}
        token: ${{ inputs.grafana-teleport-token }}
        app: ${{ steps.grafana-resolve.outputs.grafana-app }}
        listen: tcp://127.0.0.1:${{ inputs.grafana-tunnel-port }}
        timeout-ms: '60000'

    - name: Warn Grafana Teleport setup failed
      if: ${{ inputs.enable-grafana-log-enrichment == 'true' && steps.grafana-plan.outputs.needs-mcp == 'true' && (steps.grafana-teleport-setup.outcome == 'failure' || steps.grafana-tunnel.outcome == 'failure') }}
      shell: bash
      run: |
        echo "::warning::Grafana Teleport tunnel setup failed; continuing without Grafana log enrichment so Claude can still analyze the test artifacts"

    - name: Verify Grafana tunnel
      if: ${{ inputs.enable-grafana-log-enrichment == 'true' && steps.grafana-plan.outputs.needs-mcp == 'true' && inputs.grafana-mcp-endpoint == '' && steps.grafana-resolve.outputs.token-configured == 'true' && inputs.grafana-url == '' && steps.grafana-resolve.outputs.grafana-app != '' && steps.grafana-teleport-setup.outcome != 'failure' && steps.grafana-tunnel.outcome != 'failure' }}
      shell: bash
      env:
        INPUT_GRAFANA_TUNNEL_PORT: ${{ inputs.grafana-tunnel-port }}
      run: |
        set -euo pipefail

        for attempt in {1..30}; do
          if curl --fail --silent --show-error --max-time 5 "http://127.0.0.1:${INPUT_GRAFANA_TUNNEL_PORT}/api/health" > "${RUNNER_TEMP}/grafana-health.json"; then
            echo "Grafana tunnel is reachable on attempt ${attempt}"
            cat "${RUNNER_TEMP}/grafana-health.json"
            exit 0
          fi
          echo "Waiting for Grafana tunnel on 127.0.0.1:${INPUT_GRAFANA_TUNNEL_PORT}, attempt ${attempt}/30"
          if command -v ss >/dev/null 2>&1; then
            ss -ltnp || true
          else
            netstat -an | grep "${INPUT_GRAFANA_TUNNEL_PORT}" || true
          fi
          curl --verbose --max-time 2 "http://127.0.0.1:${INPUT_GRAFANA_TUNNEL_PORT}/api/health" || true
          sleep 1
        done

        echo "::warning::Grafana tunnel did not become reachable; log enrichment will likely be skipped by the reporter"

    - name: Install Grafana MCP server
      if: ${{ inputs.enable-grafana-log-enrichment == 'true' && steps.grafana-plan.outputs.needs-mcp == 'true' && inputs.grafana-mcp-endpoint == '' && steps.grafana-resolve.outputs.token-configured == 'true' && (inputs.grafana-url != '' || (steps.grafana-resolve.outputs.grafana-app != '' && steps.grafana-teleport-setup.outcome != 'failure' && steps.grafana-tunnel.outcome != 'failure')) }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_GRAFANA_MCP_VERSION: ${{ inputs.grafana-mcp-version }}
      run: |
        set -euo pipefail

        warn_install_failed() {
          local reason="$1"
          echo "::warning::Could not install mcp-grafana: ${reason}; continuing without Grafana log enrichment"
          exit 0
        }

        case "$(uname -m)" in
          x86_64|amd64) artifact="mcp-grafana_Linux_x86_64.tar.gz" ;;
          aarch64|arm64) artifact="mcp-grafana_Linux_arm64.tar.gz" ;;
          *) echo "::warning::Unsupported architecture for mcp-grafana: $(uname -m)"; exit 0 ;;
        esac

        release="${INPUT_GRAFANA_MCP_VERSION}"
        if [[ -z "$release" || "$release" == "latest" ]]; then
          echo "::error::grafana-mcp-version must be a pinned release tag, for example v0.7.10"
          exit 1
        fi

        echo "Installing mcp-grafana ${release} (${artifact})"
        if ! gh release download -R grafana/mcp-grafana "$release" \
          --pattern "$artifact" \
          --output "${RUNNER_TEMP}/mcp-grafana.tar.gz"; then
          warn_install_failed "download ${artifact} from grafana/mcp-grafana ${release} failed"
        fi
        if ! gh release download -R grafana/mcp-grafana "$release" \
          --pattern "mcp-grafana_${release#v}_checksums.txt" \
          --output "${RUNNER_TEMP}/mcp-grafana-checksums.txt"; then
          warn_install_failed "download checksum file from grafana/mcp-grafana ${release} failed"
        fi
        expected_checksum="$(awk -v artifact="$artifact" '$2 == artifact {print $1}' "${RUNNER_TEMP}/mcp-grafana-checksums.txt")"
        if [[ -z "$expected_checksum" ]]; then
          warn_install_failed "no checksum found for ${artifact} in mcp-grafana ${release}"
        fi
        actual_checksum="$(sha256sum "${RUNNER_TEMP}/mcp-grafana.tar.gz" | awk '{print $1}')"
        if [[ "$actual_checksum" != "$expected_checksum" ]]; then
          warn_install_failed "checksum mismatch for ${artifact}"
        fi
        if ! tar -xzf "${RUNNER_TEMP}/mcp-grafana.tar.gz" -C "${RUNNER_TEMP}"; then
          warn_install_failed "extract ${artifact} failed"
        fi
        if ! sudo mv "${RUNNER_TEMP}/mcp-grafana" /usr/local/bin/mcp-grafana; then
          warn_install_failed "move mcp-grafana binary into PATH failed"
        fi
        if ! mcp-grafana --help >/dev/null; then
          warn_install_failed "mcp-grafana binary health check failed"
        fi
        echo "mcp-grafana installed at $(command -v mcp-grafana)"

    - name: Start Grafana MCP server
      id: grafana-start
      if: ${{ inputs.enable-grafana-log-enrichment == 'true' && steps.grafana-plan.outputs.needs-mcp == 'true' && inputs.grafana-mcp-endpoint == '' && steps.grafana-resolve.outputs.token-configured == 'true' && (inputs.grafana-url != '' || (steps.grafana-resolve.outputs.grafana-app != '' && steps.grafana-teleport-setup.outcome != 'failure' && steps.grafana-tunnel.outcome != 'failure')) }}
      shell: bash
      env:
        INPUT_GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ inputs.grafana-service-account-token }}
        INPUT_GRAFANA_APP: ${{ steps.grafana-resolve.outputs.grafana-app }}
        INPUT_GRAFANA_TELEPORT_PROXY: ${{ inputs.grafana-teleport-proxy }}
        INPUT_GRAFANA_URL: ${{ inputs.grafana-url }}
        INPUT_GRAFANA_ORG_ID: ${{ inputs.grafana-org-id }}
        INPUT_GRAFANA_TUNNEL_PORT: ${{ inputs.grafana-tunnel-port }}
        INPUT_GRAFANA_MCP_PORT: ${{ inputs.grafana-mcp-port }}
      run: |
        set -euo pipefail

        require_single_line() {
          local name="$1"
          local value="$2"
          if [[ "$value" == *$'\n'* || "$value" == *$'\r'* ]]; then
            echo "::error::${name} must be a single-line value"
            exit 1
          fi
        }

        require_port() {
          local name="$1"
          local value="$2"
          require_single_line "$name" "$value"
          if [[ ! "$value" =~ ^[0-9]+$ ]] || (( value < 1 || value > 65535 )); then
            echo "::error::${name} must be a TCP port between 1 and 65535"
            exit 1
          fi
        }

        write_output() {
          local name="$1"
          local value="$2"
          require_single_line "$name" "$value"
          printf '%s=%s\n' "$name" "$value" >> "$GITHUB_OUTPUT"
        }

        workflow_escape() {
          local value="$1"
          value="${value//%/%25}"
          value="${value//$'\r'/%0D}"
          value="${value//$'\n'/%0A}"
          printf '%s' "$value"
        }

        mask_value() {
          local name="$1"
          local value="$2"
          if [[ -z "$value" ]]; then
            return 0
          fi
          require_single_line "$name" "$value"
          echo "::add-mask::$(workflow_escape "$value")"
        }

        require_port "grafana-tunnel-port" "$INPUT_GRAFANA_TUNNEL_PORT"
        require_port "grafana-mcp-port" "$INPUT_GRAFANA_MCP_PORT"
        require_single_line "grafana-url" "$INPUT_GRAFANA_URL"
        require_single_line "grafana-app" "$INPUT_GRAFANA_APP"
        require_single_line "grafana-teleport-proxy" "$INPUT_GRAFANA_TELEPORT_PROXY"
        require_single_line "grafana-org-id" "$INPUT_GRAFANA_ORG_ID"

        grafana_token="${INPUT_GRAFANA_SERVICE_ACCOUNT_TOKEN:-${GRAFANA_SERVICE_ACCOUNT_TOKEN:-}}"
        mask_value "grafana-service-account-token" "$grafana_token"
        if ! command -v mcp-grafana >/dev/null 2>&1; then
          echo "::warning::mcp-grafana is not installed; log enrichment will be skipped by the reporter"
          exit 0
        fi

        grafana_url="${INPUT_GRAFANA_URL}"
        if [[ -z "$grafana_url" ]]; then
          grafana_url="http://127.0.0.1:${INPUT_GRAFANA_TUNNEL_PORT}"
        fi
        report_grafana_url="$grafana_url"
        if [[ -z "${INPUT_GRAFANA_URL:-}" && -n "${INPUT_GRAFANA_APP:-}" ]]; then
          proxy_host="${INPUT_GRAFANA_TELEPORT_PROXY%%:*}"
          report_grafana_url="https://${INPUT_GRAFANA_APP}.${proxy_host}"
        fi

        echo "Starting mcp-grafana with GRAFANA_URL=${grafana_url}"
        GRAFANA_URL="$grafana_url" \
        GRAFANA_SERVICE_ACCOUNT_TOKEN="${grafana_token}" \
        GRAFANA_ORG_ID="${INPUT_GRAFANA_ORG_ID}" \
        nohup mcp-grafana \
          -t streamable-http \
          --address "127.0.0.1:${INPUT_GRAFANA_MCP_PORT}" \
          --enabled-tools datasource,loki \
          --disable-write \
          > "${RUNNER_TEMP}/mcp-grafana.log" 2>&1 &
        mcp_pid="$!"
        echo "$mcp_pid" > "${RUNNER_TEMP}/mcp-grafana.pid"

        for attempt in {1..20}; do
          if ! kill -0 "$mcp_pid" 2>/dev/null; then
            echo "::warning::mcp-grafana exited before /healthz became reachable"
            cat "${RUNNER_TEMP}/mcp-grafana.log" || true
            exit 0
          fi
          if curl --fail --silent --show-error --max-time 2 "http://127.0.0.1:${INPUT_GRAFANA_MCP_PORT}/healthz" >/dev/null; then
            write_output "grafana-mcp-endpoint" "http://127.0.0.1:${INPUT_GRAFANA_MCP_PORT}/mcp"
            write_output "grafana-report-url" "${report_grafana_url}"
            echo "mcp-grafana /healthz is reachable on attempt ${attempt}"
            echo "Grafana base URL for report links: ${report_grafana_url}"
            exit 0
          fi
          echo "Waiting for mcp-grafana on 127.0.0.1:${INPUT_GRAFANA_MCP_PORT}, attempt ${attempt}/20"
          if command -v ss >/dev/null 2>&1; then
            ss -ltnp || true
          else
            netstat -an | grep "${INPUT_GRAFANA_MCP_PORT}" || true
          fi
          curl --verbose --max-time 2 "http://127.0.0.1:${INPUT_GRAFANA_MCP_PORT}/healthz" || true
          tail -n 80 "${RUNNER_TEMP}/mcp-grafana.log" || true
          sleep 1
        done

        echo "::warning::mcp-grafana /healthz did not become reachable; log enrichment will be skipped by the reporter"
        cat "${RUNNER_TEMP}/mcp-grafana.log" || true

    - name: Install kubectl for test history OTLP writer
      if: ${{ steps.test-history-resolve.outputs.needs-otlp-tunnel == 'true' }}
      continue-on-error: true
      uses: azure/setup-kubectl@v4

    - name: Install Teleport clients for test history OTLP writer
      if: ${{ steps.test-history-resolve.outputs.needs-otlp-tunnel == 'true' }}
      continue-on-error: true
      uses: teleport-actions/setup@a820ebbf1bc1a496efca348ad21042d6e8df73a6
      with:
        version: auto
        proxy: ${{ inputs.test-history-teleport-proxy }}

    - name: Authenticate test history OTLP writer
      if: ${{ steps.test-history-resolve.outputs.needs-otlp-tunnel == 'true' }}
      continue-on-error: true
      uses: teleport-actions/auth-k8s@v2
      with:
        proxy: ${{ inputs.test-history-teleport-proxy }}
        token: ${{ inputs.test-history-teleport-token }}
        kubernetes-cluster: ${{ inputs.test-history-kube-cluster }}

    - name: Open test history OTLP collector tunnel
      if: ${{ steps.test-history-resolve.outputs.needs-otlp-tunnel == 'true' }}
      shell: bash
      env:
        INPUT_TEST_HISTORY_COLLECTOR_NAMESPACE: ${{ inputs.test-history-collector-namespace }}
        INPUT_TEST_HISTORY_COLLECTOR_SERVICE: ${{ inputs.test-history-collector-service }}
        INPUT_TEST_HISTORY_OTLP_LOCAL_PORT: ${{ inputs.test-history-otlp-local-port }}
        INPUT_TEST_HISTORY_OTLP_COLLECTOR_PORT: ${{ inputs.test-history-otlp-collector-port }}
        TEST_HISTORY_OTLP_ENDPOINT: ${{ steps.test-history-resolve.outputs.otlp-endpoint }}
      run: |
        set -euo pipefail

        require_single_line() {
          local name="$1"
          local value="$2"
          if [[ "$value" == *$'\n'* || "$value" == *$'\r'* ]]; then
            echo "::error::${name} must be a single-line value"
            exit 1
          fi
        }

        require_port() {
          local name="$1"
          local value="$2"
          require_single_line "$name" "$value"
          if [[ ! "$value" =~ ^[0-9]+$ ]] || (( value < 1 || value > 65535 )); then
            echo "::error::${name} must be a TCP port between 1 and 65535"
            exit 1
          fi
        }

        namespace="${INPUT_TEST_HISTORY_COLLECTOR_NAMESPACE}"
        service="${INPUT_TEST_HISTORY_COLLECTOR_SERVICE}"
        local_port="${INPUT_TEST_HISTORY_OTLP_LOCAL_PORT}"
        collector_port="${INPUT_TEST_HISTORY_OTLP_COLLECTOR_PORT}"
        endpoint="${TEST_HISTORY_OTLP_ENDPOINT}"

        require_single_line "test-history-collector-namespace" "$namespace"
        require_single_line "test-history-collector-service" "$service"
        require_port "test-history-otlp-local-port" "$local_port"
        require_port "test-history-otlp-collector-port" "$collector_port"
        require_single_line "test-history-otlp-endpoint" "$endpoint"

        if [[ ! "$namespace" =~ ^[A-Za-z0-9._-]+$ ]]; then
          echo "::warning::test-history-collector-namespace contains unsupported characters; test history publishing will fall back to spool only"
          exit 0
        fi
        if [[ ! "$service" =~ ^[A-Za-z0-9._-]+$ ]]; then
          echo "::warning::test-history-collector-service contains unsupported characters; test history publishing will fall back to spool only"
          exit 0
        fi
        if ! command -v kubectl >/dev/null 2>&1; then
          echo "::warning::kubectl is not installed; test history publishing will fall back to spool only"
          exit 0
        fi

        log_path="${RUNNER_TEMP}/test-history-otlp-port-forward.log"
        pid_path="${RUNNER_TEMP}/test-history-otlp-port-forward.pid"
        echo "Opening OTLP collector port-forward to ${namespace}/svc/${service} on 127.0.0.1:${local_port}"
        nohup kubectl port-forward \
          -n "$namespace" \
          --address 127.0.0.1 \
          "svc/${service}" \
          "${local_port}:${collector_port}" \
          > "$log_path" 2>&1 &
        port_forward_pid="$!"
        echo "$port_forward_pid" > "$pid_path"

        for attempt in {1..20}; do
          if ! kill -0 "$port_forward_pid" 2>/dev/null; then
            echo "::warning::test history OTLP port-forward exited before the collector became reachable"
            cat "$log_path" || true
            exit 0
          fi
          status="$(curl --silent --output /dev/null --write-out "%{http_code}" --max-time 2 "$endpoint" || true)"
          if [[ "$status" != "000" ]]; then
            echo "Test history OTLP collector tunnel is reachable on attempt ${attempt}"
            exit 0
          fi
          echo "Waiting for test history OTLP collector tunnel on 127.0.0.1:${local_port}, attempt ${attempt}/20"
          sleep 1
        done

        echo "::warning::test history OTLP collector tunnel did not become reachable; reporter will still write the NDJSON spool"
        cat "$log_path" || true

    - name: Generate Test Results Report
      id: report
      shell: bash
      env:
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_TEST_RESULTS_PATH_RAW: ${{ inputs.test-results-path }}
        INPUT_PREVIOUS_RESULTS_PATH_RAW: ${{ inputs.previous-results-path }}
        INPUT_PREVIOUS_RESULTS_FORMAT: ${{ inputs.previous-results-format }}
        INPUT_PREVIOUS_RESULTS_SOURCE: ${{ inputs.previous-results-source }}
        INPUT_COMPARE_WITH_PREVIOUS: ${{ inputs.compare-with-previous }}
        INPUT_WRITE_STEP_SUMMARY: ${{ inputs.write-step-summary }}
        INPUT_SEND_SLACK: ${{ inputs.send-slack }}
        INPUT_SLACK_WEBHOOK_URL: ${{ inputs.slack-webhook-url }}
        INPUT_FAIL_ON_SLACK_ERROR: ${{ inputs.fail-on-slack-error }}
        INPUT_ENVIRONMENT: ${{ inputs.environment }}
        INPUT_BRANCH: ${{ inputs.branch }}
        INPUT_ACTOR: ${{ inputs.actor }}
        INPUT_TITLE: ${{ inputs.title }}
        INPUT_WORKFLOW_URL: ${{ inputs.workflow-url }}
        INPUT_REPORT_URL: ${{ inputs.report-url }}
        INPUT_PUBLISH_TEST_HISTORY: ${{ steps.test-history-resolve.outputs.enabled }}
        INPUT_TEST_HISTORY_PUBLISH_MODE: ${{ steps.test-history-resolve.outputs.mode }}
        INPUT_TEST_HISTORY_OTLP_ENDPOINT: ${{ steps.test-history-resolve.outputs.otlp-endpoint }}
        INPUT_TEST_HISTORY_API_URL: ${{ inputs.test-history-api-url }}
        INPUT_TEST_HISTORY_TOKEN: ${{ inputs.test-history-token }}
        TEST_HISTORY_API_URL: ${{ env.TEST_HISTORY_API_URL }}
        TEST_HISTORY_TOKEN: ${{ env.TEST_HISTORY_TOKEN }}
        TEST_HISTORY_OTLP_ENDPOINT: ${{ env.TEST_HISTORY_OTLP_ENDPOINT }}
        INPUT_TEST_HISTORY_SUITE: ${{ inputs.test-history-suite }}
        INPUT_TEST_HISTORY_FRAMEWORK: ${{ inputs.test-history-framework }}
        INPUT_TEST_HISTORY_ENV: ${{ inputs.test-history-env }}
        INPUT_TEST_HISTORY_OUTPUT_PATH_RAW: ${{ inputs.test-history-output-path }}
        INPUT_TEST_HISTORY_ARTIFACT_URL: ${{ inputs.test-history-artifact-url }}
        INPUT_MAX_FAILURES: ${{ inputs.max-failures }}
        INPUT_MAX_SKIPS: ${{ inputs.max-skips }}
        INPUT_INCLUDE_SKIPS: ${{ inputs.include-skips }}
        INPUT_ENABLE_AI_ANALYSIS: ${{ inputs.enable-ai-analysis }}
        INPUT_CLAUDE_TOKEN: ${{ inputs.claude-token }}
        INPUT_ENABLE_GRAFANA_LOG_ENRICHMENT: ${{ inputs.enable-grafana-log-enrichment }}
        INPUT_GRAFANA_URL: ${{ inputs.grafana-url }}
        INPUT_GRAFANA_MCP_ENDPOINT: ${{ inputs.grafana-mcp-endpoint }}
        GRAFANA_MCP_ENDPOINT: ${{ steps.grafana-start.outputs.grafana-mcp-endpoint }}
        GRAFANA_REPORT_URL: ${{ steps.grafana-start.outputs.grafana-report-url }}
        GRAFANA_ORG_ID: ${{ inputs.grafana-org-id }}
        INPUT_GRAFANA_ORG_ID: ${{ inputs.grafana-org-id }}
        INPUT_GRAFANA_LOKI_DATASOURCE_UID: ${{ inputs.grafana-loki-datasource-uid }}
        INPUT_GRAFANA_LOKI_DATASOURCE_NAME: ${{ inputs.grafana-loki-datasource-name }}
        INPUT_GRAFANA_LOG_START: ${{ inputs.grafana-log-start }}
        INPUT_GRAFANA_LOG_END: ${{ inputs.grafana-log-end }}
        INPUT_GRAFANA_LOG_LOOKBACK: ${{ inputs.grafana-log-lookback }}
        INPUT_GRAFANA_LOG_LIMIT: ${{ inputs.grafana-log-limit }}
        INPUT_GRAFANA_LOG_CONCURRENCY: ${{ inputs.grafana-log-concurrency }}
        INPUT_GRAFANA_LOG_MAX_FAILURES: ${{ inputs.grafana-log-max-failures }}
        INPUT_GRAFANA_QUERY_PLAN_PATH: ${{ steps.grafana-plan.outputs.plan-path }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail

        require_single_line() {
          local name="$1"
          local value="$2"
          if [[ "$value" == *$'\n'* || "$value" == *$'\r'* ]]; then
            echo "::error::${name} must be a single-line value"
            exit 1
          fi
        }

        workflow_escape() {
          local value="$1"
          value="${value//%/%25}"
          value="${value//$'\r'/%0D}"
          value="${value//$'\n'/%0A}"
          printf '%s' "$value"
        }

        mask_value() {
          local name="$1"
          local value="$2"
          if [[ -z "$value" ]]; then
            return 0
          fi
          require_single_line "$name" "$value"
          echo "::add-mask::$(workflow_escape "$value")"
        }

        mask_value "slack-webhook-url" "${INPUT_SLACK_WEBHOOK_URL:-}"
        mask_value "claude-token" "${INPUT_CLAUDE_TOKEN:-}"
        require_single_line "test-history-publish-mode" "${INPUT_TEST_HISTORY_PUBLISH_MODE:-}"
        require_single_line "test-history-api-url" "${INPUT_TEST_HISTORY_API_URL:-${TEST_HISTORY_API_URL:-}}"
        require_single_line "test-history-otlp-endpoint" "${INPUT_TEST_HISTORY_OTLP_ENDPOINT:-${TEST_HISTORY_OTLP_ENDPOINT:-}}"
        mask_value "test-history-token" "${INPUT_TEST_HISTORY_TOKEN:-${TEST_HISTORY_TOKEN:-}}"
        if [[ -z "${INPUT_GRAFANA_MCP_ENDPOINT:-}" && -n "${GRAFANA_MCP_ENDPOINT:-}" ]]; then
          export INPUT_GRAFANA_MCP_ENDPOINT="${GRAFANA_MCP_ENDPOINT}"
        fi
        if [[ -z "${INPUT_GRAFANA_URL:-}" && -n "${GRAFANA_REPORT_URL:-}" ]]; then
          export INPUT_GRAFANA_URL="${GRAFANA_REPORT_URL}"
        fi

        WORKSPACE_DIR="${GITHUB_WORKSPACE:-$(pwd)}"

        TEST_RESULTS_PATH="${INPUT_TEST_RESULTS_PATH_RAW}"
        if [[ ! "$TEST_RESULTS_PATH" = /* ]]; then
          TEST_RESULTS_PATH="$WORKSPACE_DIR/$TEST_RESULTS_PATH"
        fi

        PREVIOUS_RESULTS_PATH="${INPUT_PREVIOUS_RESULTS_PATH_RAW}"
        if [[ -n "$PREVIOUS_RESULTS_PATH" && ! "$PREVIOUS_RESULTS_PATH" = /* ]]; then
          PREVIOUS_RESULTS_PATH="$WORKSPACE_DIR/$PREVIOUS_RESULTS_PATH"
        fi

        TEST_HISTORY_OUTPUT_PATH="${INPUT_TEST_HISTORY_OUTPUT_PATH_RAW}"
        require_single_line "test-history-output-path" "$TEST_HISTORY_OUTPUT_PATH"
        if [[ -n "$TEST_HISTORY_OUTPUT_PATH" && ! "$TEST_HISTORY_OUTPUT_PATH" = /* ]]; then
          TEST_HISTORY_OUTPUT_PATH="$WORKSPACE_DIR/$TEST_HISTORY_OUTPUT_PATH"
        fi

        export INPUT_TEST_RESULTS_PATH="$TEST_RESULTS_PATH"
        export INPUT_PREVIOUS_RESULTS_PATH="$PREVIOUS_RESULTS_PATH"
        export INPUT_TEST_HISTORY_OUTPUT_PATH="$TEST_HISTORY_OUTPUT_PATH"

        cd "${ACTION_PATH}"
        go run .

    - name: Upload test history retry spool
      id: test-history-upload-spool
      if: ${{ always() && steps.report.outputs.test-history-enabled == 'true' && steps.report.outputs.test-history-events != '0' && steps.report.outputs.test-history-spool-path != '' && (steps.test-history-resolve.outputs.upload-spool == 'always' || (steps.test-history-resolve.outputs.upload-spool == 'on-failure' && steps.report.outputs.test-history-shipping-status == 'failed')) }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.test-history-spool-artifact-name }}
        path: ${{ steps.report.outputs.test-history-spool-path }}
        if-no-files-found: warn
        include-hidden-files: true
        retention-days: 14

    - name: Dump test history OTLP port-forward logs
      if: ${{ always() && steps.test-history-resolve.outputs.needs-otlp-tunnel == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        echo "=== test history OTLP port-forward log ==="
        cat "${RUNNER_TEMP}/test-history-otlp-port-forward.log" 2>/dev/null || true

        if [[ -f "${RUNNER_TEMP}/test-history-otlp-port-forward.pid" ]]; then
          kill "$(cat "${RUNNER_TEMP}/test-history-otlp-port-forward.pid")" 2>/dev/null || true
        fi

    - name: Dump Grafana MCP logs
      if: ${{ always() && inputs.enable-grafana-log-enrichment == 'true' && steps.grafana-plan.outputs.needs-mcp == 'true' && inputs.grafana-mcp-endpoint == '' && steps.grafana-resolve.outputs.token-configured == 'true' && (inputs.grafana-url != '' || steps.grafana-resolve.outputs.grafana-app != '') }}
      shell: bash
      run: |
        set -euo pipefail

        echo "=== mcp-grafana log ==="
        cat "${RUNNER_TEMP}/mcp-grafana.log" 2>/dev/null || true

        if [[ -f "${RUNNER_TEMP}/mcp-grafana.pid" ]]; then
          kill "$(cat "${RUNNER_TEMP}/mcp-grafana.pid")" 2>/dev/null || true
        fi
